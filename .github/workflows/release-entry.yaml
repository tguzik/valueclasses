name: Release Changelog

on:
  workflow_dispatch:  # For manual testing; No additional yaml keys are necessary
  push:
    # Automatically create a GitHub Release entry when a tag that looks like a new release is pushed.
    # The tag pattern is defined in maven-release-plugin's settings in pom.xml authoritatively. The changelog
    # generator - git-cliff - just goes through all relevant tags, regardless of their name.
    tags:
      - 'v[0-9]+.*'

permissions: {}

concurrency:
  group: rel-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create GitHub Release entry
    runs-on: ubuntu-slim
    permissions:
      contents: write # Needed by softprops/action-gh-release to create the GitHub Release entry
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          persist-credentials: false
          #
          # Fetch full history, including tags, or otherwise the changelog generation will silently fail:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # https://github.com/cachix/install-nix-action/releases/tag/v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Print nixpkgs version
        run: |
          nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'

      - name: Install DevEnv
        env:
          LOCAL_DEVENV_REVISION: 55d2bb4a3cc710ba82cc8644f4419db3a802e1a4 # https://github.com/cachix/devenv/releases/tag/v2.0.6
        run: |
          nix profile add "github:cachix/devenv/${LOCAL_DEVENV_REVISION}" --accept-flake-config --option extra-substituters "https://devenv.cachix.org?trusted=true&priority=3"

      - name: Generate change list
        shell: devenv shell bash -- -e {0}
        run: |
          task release:changelog FILE=changes.md

      - name: Include the change list in summary
        shell: devenv shell bash -- -e {0}
        continue-on-error: true
        run: |
          echo -e "# Generated change list:\n\n----\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat changes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release entry
        if: github.ref_type == 'tag' && github.event_name == 'push'
        shell: devenv shell bash -- -e {0}
        env:
          GH_TOKEN: ${{ github.token }}
          LOCAL_CURRENT_TAG: ${{ github.ref_name }}
        run: |
          gh release create --draft --notes-file changes.md --fail-on-no-commits "${LOCAL_CURRENT_TAG}"

# eof
